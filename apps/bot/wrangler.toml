name = "yourrank-bot"
main = "src/worker.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

[vars]
PUBLIC_BASE_URL = "https://yourrank.site"
RL_BACKEND = "do"  # Change to "kv" to use KV for rate limiting
# RL_FAIL_OPEN = "false"  # Set to "false" to block requests when the rate-limit backend is down. Default is "true" (fail-open).
# Set SENTRY_DSN via `wrangler secret put SENTRY_DSN` when ready

# Serve the bot Worker under the /bot, /hook, /r, /pb, /billing prefixes on the
# main zone. More-specific routes win, so the leaderboard Worker keeps the root.
routes = [
  { pattern = "yourrank.site/bot",           zone_name = "yourrank.site" },
  { pattern = "yourrank.site/bot/*",         zone_name = "yourrank.site" },
  { pattern = "yourrank.site/hook/*",        zone_name = "yourrank.site" },
  { pattern = "yourrank.site/r/*",           zone_name = "yourrank.site" },
  { pattern = "yourrank.site/pb/*",          zone_name = "yourrank.site" },
  { pattern = "yourrank.site/billing/hook/*", zone_name = "yourrank.site" },
]

[[queues.producers]]
queue = "yourrank-events"
binding = "EVENTS_QUEUE"

[triggers]
# every minute: broadcast batches  |  03:00 UTC: rollup + partitions + expired plans
crons = ["* * * * *", "0 3 * * *"]


# --- Durable Object for rate limiting ---
[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiter"

# Postgres via Hyperdrive — recreated with correct username (postgres).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "9e5b625bfdd84cd691b44c4780bdaf13"

# Secrets (wrangler secret put ...):
#   DATABASE_URL            # Supabase connection string (only if not using Hyperdrive)
#   TOKEN_ENC_KEY           # 32-byte hex, encrypts streamer bot tokens
#   ADMIN_API_KEY           # protects /bot/api/*
#   IP_HASH_SALT            # salts hashed visitor IPs
#   LOGIN_BOT_TOKEN         # @BotFather token for the Telegram Login widget (/bot dashboard)
#   LOGIN_BOT_USERNAME      # the login bot's @username (the widget needs it)
#   PLATFORM_BOT_TOKEN      # the YourRank platform bot (Telegram Stars billing)
#   PLATFORM_WEBHOOK_SECRET # billing webhook secret

# ---------------------------------------------------------------------------
# Staging environment (wrangler deploy --env staging)
# ---------------------------------------------------------------------------
[env.staging]
name = "yourrank-bot-staging"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "staging.yourrank.site/bot",           zone_name = "yourrank.site" },
  { pattern = "staging.yourrank.site/bot/*",         zone_name = "yourrank.site" },
  { pattern = "staging.yourrank.site/hook/*",        zone_name = "yourrank.site" },
  { pattern = "staging.yourrank.site/r/*",           zone_name = "yourrank.site" },
  { pattern = "staging.yourrank.site/pb/*",          zone_name = "yourrank.site" },
  { pattern = "staging.yourrank.site/billing/hook/*", zone_name = "yourrank.site" },
]

[env.staging.triggers]
crons = []

[env.staging.vars]
PUBLIC_BASE_URL = "https://staging.yourrank.site"


# Staging Hyperdrive — points to same Supabase DB as production (separate Worker env)
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "51ed0ab98c56445a93872b74ee5b3be6"
