name = "yourrank-site"
# Build first: `node build.js` regenerates src/assets_bundled.js from the files
# in src/assets/ (inlined as strings). Wrangler bundles from src/index.js and
# follows its imports (including the 'postgres' driver).
main = "src/index.js"
compatibility_date = "2025-01-01"
# postgres.js needs the Node compat shim (process, Buffer, etc.) on Workers.
# v1 (nodejs_compat) works; if you hit module-polyfill issues on deploy, bump
# to nodejs_compat_v2 and a newer compatibility_date per Cloudflare's guidance.
compatibility_flags = ["nodejs_compat"]

# This Worker owns the ROOT of the zone. The bot Worker claims the more-specific
# /bot/*, /hook/*, /r/*, /pb/*, /billing/hook/* prefixes; more-specific wins, so
# everything else (/, /login, /signup, /dashboard, /<slug>, /go/<slug>) lands here.
routes = [
  { pattern = "yourrank.site/*", zone_name = "yourrank.site" },
]

# --- Sessions live in KV (shared with the bot Worker), NOT in Postgres. ---
# WARNING: This KV namespace is shared with the bot Worker (apps/bot/wrangler.toml).
# Both Workers use the same SESSIONS KV for cross-Worker session sharing.
# If this namespace is deleted from the Cloudflare dashboard, ALL active sessions
# across the entire platform are wiped simultaneously — instant total logout.
# Consider adding Cloudflare account-level protections (e.g., API token restrictions).
[[kv_namespaces]]
binding = "SESSIONS"
id = "26e47bcce19941839a20bd2cd5879e42"

# --- Postgres (Supabase) via Hyperdrive. ---
# Config recreated with correct username (postgres, not postgres.<ref>).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "9e5b625bfdd84cd691b44c4780bdaf13"

[vars]
APP_NAME = "YourRank"
CF_ZONE_ID = "dd79a3ac13643b94732f2fef6ce3b1f5"

# --- Secrets (set via `wrangler secret put <NAME>`), NOT stored here: ---
#   DATABASE_URL            (fallback if Hyperdrive isn't bound)
#   NOWPAYMENTS_API_KEY
#   NOWPAYMENTS_IPN_SECRET
#   RESEND_API_KEY          (optional; transactional email — signup/lead/reset)
#   MAIL_FROM               (required if RESEND_API_KEY is set; the From: address,
#                            e.g. "RankUp <hey@yourrank.site>" — Resend rejects
#                            an empty From)
#   PRO_PRICE_USD           (optional; defaults to 29)
#   LEAD_WEBHOOK_URL        (optional; Discord/Slack ping on a new lead)
#   DISCORD_MONITORING_WEBHOOK (optional; error reporting + cron summaries)

# ---------------------------------------------------------------------------
# Staging environment (wrangler deploy --env staging)
# See STAGING.md for setup instructions.
# ---------------------------------------------------------------------------
[env.staging]
name = "yourrank-site-staging"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "staging.yourrank.site/*", zone_name = "yourrank.site" },
]

[env.staging.vars]
APP_NAME = "YourRank (Staging)"

# Staging KV namespace (separate from production — sessions don't carry over)
# Create with: npx wrangler kv namespace create SESSIONS --env staging
[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "e0b6cba066ad4168ad76629f23b5111d"

# Staging Hyperdrive — CRITICAL: MUST USE SEPARATE DATABASE FROM PRODUCTION
# Create a separate staging Hyperdrive instance and update the id below.
# DO NOT share the production database with staging as this can destroy real user data.
# Current id is a placeholder - replace with actual staging Hyperdrive id.
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
# TODO: Replace with staging-specific Hyperdrive id after creating staging database
# id = "YOUR_STAGING_HYPERDRIVE_ID_HERE"
# TEMPORARY: Commented out to prevent accidental production DB usage
# id = "9e5b625bfdd84cd691b44c4780bdaf13"
