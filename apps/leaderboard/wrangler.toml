name = "yourrank-site"
# Build first: `node build.js` regenerates src/assets_bundled.js from the files
# in src/assets/ (inlined as strings). Wrangler bundles from src/index.js and
# follows its imports (including the 'postgres' driver).
main = "src/index.js"
compatibility_date = "2025-07-01"
# postgres.js needs the Node compat shim (process, Buffer, etc.) on Workers.
# v1 (nodejs_compat) works; if you hit module-polyfill issues on deploy, bump
# to nodejs_compat_v2 and a newer compatibility_date per Cloudflare's guidance.
compatibility_flags = ["nodejs_compat"]

# This Worker owns the ROOT of the zone. The bot Worker claims the more-specific
# /bot/*, /hook/*, /r/*, /pb/*, /billing/hook/* prefixes; more-specific wins, so
# everything else (/, /login, /signup, /dashboard, /<slug>, /go/<slug>) lands here.
routes = [
  { pattern = "yourrank.site/*", zone_name = "yourrank.site" },
]


# --- Durable Object for rate limiting (replaces KV writes) ---
# Set RL_BACKEND=do to use DO instead of KV for rate limiting.
# Keeps fail-open behavior if DO is unreachable.
[[durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiter"

# --- Event queue producer ---
# Analytics (views, clicks, copies) and postback conversions are enqueued here
# for the consumer Worker to process durably off the request thread.
[[queues.producers]]
queue = "yourrank-events"
binding = "EVENTS_QUEUE"

# --- Postgres (Supabase) via Hyperdrive. ---
# Config recreated with correct username (postgres, not postgres.<ref>).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "9e5b625bfdd84cd691b44c4780bdaf13"

[vars]
APP_NAME = "YourRank"
CF_ZONE_ID = "dd79a3ac13643b94732f2fef6ce3b1f5"
RL_BACKEND = "do"  # Change to "kv" to use KV for rate limiting
RL_FAIL_OPEN = "false"  # Block requests when the rate-limit backend is down (fail-closed).
POSTBACK_UNSIGNED_ENABLED = "true"  # Set false at the documented sunset after usage review.
# Production session cookie is scoped to the apex domain so it is shared across
# subdomains, but isolated from staging by the staging value below.
SESSION_COOKIE_DOMAIN = ".yourrank.site"
# Set SENTRY_DSN via `wrangler secret put SENTRY_DSN` when ready

# --- Secrets (set via `wrangler secret put <NAME>`), NOT stored here: ---
#   DATABASE_URL            (fallback if Hyperdrive isn't bound)
#   NOWPAYMENTS_API_KEY
#   NOWPAYMENTS_IPN_SECRET
#   RESEND_API_KEY          (optional; transactional email — signup/lead/reset)
#   TOKEN_ENC_KEY           # 32-byte hex, encrypts TOTP secrets for admin 2FA
#   MAIL_FROM               (required if RESEND_API_KEY is set; the From: address,
#                            e.g. "YourRank <hey@yourrank.site>" — Resend rejects
#                            an empty From)
#   PRO_PRICE_USD           (optional; defaults to 29)
#   LEAD_WEBHOOK_URL        (optional; Discord/Slack ping on a new lead)
#   DISCORD_MONITORING_WEBHOOK (optional; error reporting + cron summaries)

# ---------------------------------------------------------------------------
# Staging environment (wrangler deploy --env staging)
# See STAGING.md for setup instructions.
# ---------------------------------------------------------------------------
[env.staging]
name = "yourrank-site-staging"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "staging.yourrank.site/*", zone_name = "yourrank.site" },
]

[env.staging.vars]
APP_NAME = "YourRank (Staging)"
POSTBACK_UNSIGNED_ENABLED = "true"
# Staging cookies must not be visible to the production apex domain.
SESSION_COOKIE_DOMAIN = ".staging.yourrank.site"


[[env.staging.durable_objects.bindings]]
name = "RATE_LIMITER_DO"
class_name = "RateLimiter"

# Staging Hyperdrive — points to same Supabase DB as production (separate Worker env)
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "51ed0ab98c56445a93872b74ee5b3be6"
