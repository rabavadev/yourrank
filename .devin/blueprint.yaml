# Devin environment blueprint for rabavadev/yourrank
# https://docs.devin.ai/onboard-devin/environment-yaml
initialize: |
  # Install Bun (used for install, build, lint, and test)
  export BUN_INSTALL=/home/ubuntu/.bun
  curl -fsSL https://bun.sh/install | bash
  echo 'export PATH="/home/ubuntu/.bun/bin:$PATH"' >> $ENVRC

  # Install Node 22 (required for `wrangler dev` / `wrangler deploy`)
  export NVM_DIR=/home/ubuntu/.nvm
  curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.0/install.sh | bash
  source "$NVM_DIR/nvm.sh"
  nvm install 22
  nvm alias default 22
  echo 'export NVM_DIR="/home/ubuntu/.nvm"' >> $ENVRC
  echo '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" && nvm use 22 >/dev/null 2>&1' >> $ENVRC
maintenance: |
  # Install workspace dependencies
  bun install --frozen-lockfile
knowledge:
  - name: lint
    contents: |
      (cd apps/leaderboard && bun run lint)
      (cd apps/bot && bun run lint)
  - name: test
    contents: |
      (cd apps/leaderboard && bun test)
      (cd apps/bot && bun test)
  - name: e2e
    contents: |
      # Requires live deployment. Defaults to production; override with E2E_BASE_URL.
      # Optional: E2E_TELEGRAM_BOT_TOKEN to connect and test a real Telegram bot.
      (cd e2e && bun run test)
  - name: build
    contents: |
      (cd apps/leaderboard && bun run build)
      (cd apps/bot && bun run build)
  - name: typecheck
    contents: |
      (cd apps/bot && bun run typecheck)
  - name: notes
    contents: |
      # Local wrangler dev needs Node 22, `docker compose up -d`, and
      # CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE in .dev.vars.
      # Run supabase db push for new migrations before deploying.
      # Set SUPPORT_EMAIL and MAIL_FROM in Cloudflare secrets before launch.
