name: Deploy

# Push to main -> run pending DB migrations via Supabase CLI, then deploy both Workers.
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (for CLI auth)
#   SUPABASE_DB_PASSWORD   — Database password (for supabase link --password)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref lygcqzjxlqbvymkfjvel --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase db push

  deploy-leaderboard:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@735343b667d3e6bfb39c11a0c3b3a1ca0a8a8c0e
      - working-directory: apps/leaderboard
        run: bun install --frozen-lockfile
      - working-directory: apps/leaderboard
        run: node build.js
      - uses: cloudflare/wrangler-action@6d50771a405efa6ad3b959cf90f9e64ca6711e4d
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: deploy
          wranglerVersion: "4.106.0"

  deploy-bot:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@735343b667d3e6bfb39c11a0c3b3a1ca0a8a8c0e
      - working-directory: apps/bot
        run: bun install --frozen-lockfile
      - working-directory: apps/bot
        run: bun run typecheck
      - uses: cloudflare/wrangler-action@6d50771a405efa6ad3b959cf90f9e64ca6711e4d
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: deploy
          wranglerVersion: "4.106.0"
