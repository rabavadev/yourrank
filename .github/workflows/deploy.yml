name: Deploy

# Push to main -> run pending DB migrations via Supabase CLI, then deploy both Workers.
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (for CLI auth)
#   SUPABASE_DB_PASSWORD   — Database password (for supabase link --password)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Migrations are best-effort: deploy proceeds even if DB secrets are missing/wrong.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
        with:
          version: 2.39.2

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "SKIP: SUPABASE_DB_PASSWORD not set — skipping migrations"
            exit 0
          fi
          if supabase link --project-ref lygcqzjxlqbvymkfjvel --password "$SUPABASE_DB_PASSWORD"; then
            supabase db push
            echo "Migrations applied successfully"
          else
            echo "SKIP: supabase link failed — skipping migrations"
            exit 0
          fi

  deploy-leaderboard:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@735343b667d3e6bfb39c11a0c3b3a1ca0a8a8c0e
        with:
          bun-version: '1.2.15'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/leaderboard
        run: bun test
      - working-directory: apps/leaderboard
        run: node build.js
      - uses: cloudflare/wrangler-action@6d50771a405efa6ad3b959cf90f9e64ca6711e4d
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: deploy
          wranglerVersion: "4.106.0"

  deploy-bot:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@735343b667d3e6bfb39c11a0c3b3a1ca0a8a8c0e
        with:
          bun-version: '1.2.15'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/bot
        run: bun test
      - working-directory: apps/bot
        run: bun run typecheck
      - uses: cloudflare/wrangler-action@6d50771a405efa6ad3b959cf90f9e64ca6711e4d
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: deploy
          wranglerVersion: "4.106.0"

  smoke-test:
    needs: [deploy-leaderboard, deploy-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare propagation
        run: sleep 15

      - name: "Smoke: leaderboard (yourrank.site)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://yourrank.site/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: leaderboard returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: leaderboard HTTP $STATUS"

      - name: "Smoke: bot worker + database"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://yourrank.site/r/smoke-probe-ci)
          if [ "$STATUS" = "404" ]; then
            echo "OK: bot worker + DB healthy (HTTP 404 — slug not found, as expected)"
          elif [ "$STATUS" = "500" ]; then
            echo "FAIL: bot DB appears to be down (HTTP 500)"
            exit 1
          else
            echo "FAIL: unexpected HTTP $STATUS from bot worker"
            exit 1
          fi

      - name: "Smoke: bot dashboard"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://yourrank.site/bot/dashboard)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: bot dashboard returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: bot dashboard HTTP $STATUS"

      - name: Summarise failure
        if: failure()
        run: |
          echo "==========================================="
          echo "SMOKE TEST FAILED — deploy may be broken."
          echo "Commit: ${{ github.sha }}"
          echo "Check https://yourrank.site manually."
          echo "==========================================="
