name: Deploy

# Push to main -> run pending DB migrations via Supabase CLI, then deploy both Workers.
# If the smoke test fails after a successful deploy, the rollback job automatically
# reverts both Workers to their previous Cloudflare deployment via `wrangler rollback`.
# Required GitHub repo secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id
#   SUPABASE_ACCESS_TOKEN  — Supabase personal access token (for CLI auth)
#   SUPABASE_DB_PASSWORD   — Database password (for supabase link --password)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
        with:
          version: 2.39.2

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD not set — cannot run migrations. Set it in repo secrets."
            exit 1
          fi
          if supabase link --project-ref lygcqzjxlqbvymkfjvel --password "$SUPABASE_DB_PASSWORD"; then
            supabase db push --include-all
            echo "Migrations applied successfully"
          else
            echo "::error::supabase link failed — check SUPABASE_DB_PASSWORD and project ref"
            exit 1
          fi

  deploy-leaderboard:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    outputs:
      lb-version: ${{ steps.capture-lb.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/leaderboard
        run: |
          # Run each test file in isolation to prevent mock.module cross-contamination
          for f in src/__tests__/*.test.js; do
            echo "--- $f ---"
            bun test "$f" || exit 1
          done
      - name: Check test coverage threshold
        working-directory: apps/leaderboard
        run: |
          set -o pipefail
          # audit-validation uses process-global module mocks and is already run
          # in isolation above; loading it with other files corrupts their mocks.
          mapfile -t COVERAGE_FILES < <(find src/__tests__ -name '*.test.js' ! -name 'audit-validation.test.js' -print | sort)
          bun test --coverage "${COVERAGE_FILES[@]}" 2>&1 | tee /tmp/coverage.txt
          COVERAGE=$(grep "All files" /tmp/coverage.txt | head -1 | awk -F'|' '{gsub(/[^0-9.]/, "", $3); print $3}')
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not parse coverage percentage from test output"
            exit 1
          fi
          if ! awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 60) }'; then
            echo "::error::Test coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
          echo "OK: Test coverage ${COVERAGE}% meets 60% threshold"
      - working-directory: apps/leaderboard
        run: node build.js
      - name: Capture current leaderboard version
        id: capture-lb
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CURRENT=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/services/yourrank-site/environments/production" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            | jq -r '.result.default_environment.script.hash // "none"')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current leaderboard version: $CURRENT"

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: deploy
          wranglerVersion: "4.106.0"

  deploy-bot:
    needs: [migrate, deploy-leaderboard]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      bot-version: ${{ steps.capture-bot.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/bot
        run: bun test
      - working-directory: apps/bot
        run: bun run typecheck
      - name: Build shared TypeScript
        run: node build-shared.mjs
      - name: Capture current bot version
        id: capture-bot
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          CURRENT=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/services/yourrank-bot/environments/production" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            | jq -r '.result.default_environment.script.hash // "none"')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current bot version: $CURRENT"

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: deploy
          wranglerVersion: "4.106.0"

  deploy-consumer:
    name: Deploy queue consumer
    needs: [migrate, deploy-bot]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Build shared TypeScript
        run: node build-shared.mjs
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/consumer
          command: deploy
          wranglerVersion: "4.106.0"

  smoke-test:
    needs: [deploy-leaderboard, deploy-bot, deploy-consumer]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare propagation
        run: |
          MAX_RETRIES=6
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 https://yourrank.site/ || true)
            if [ "$STATUS" = "200" ]; then
              echo "OK: yourrank.site is live (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS — retrying in 10s…"
            sleep 10
          done
          echo "FAIL: yourrank.site not reachable after $MAX_RETRIES attempts"
          exit 1

      - name: "Smoke: leaderboard (yourrank.site)"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://yourrank.site/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: leaderboard returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: leaderboard HTTP $STATUS"

      - name: "Smoke: pricing page"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://yourrank.site/pricing)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: pricing returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: pricing HTTP $STATUS"

      - name: "Smoke: contact page"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://yourrank.site/contact)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: contact returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: contact HTTP $STATUS"

      - name: "Smoke: bot worker + database"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://yourrank.site/r/smoke-probe-ci)
          if [ "$STATUS" = "404" ]; then
            echo "OK: bot worker + DB healthy (HTTP 404 — slug not found, as expected)"
          elif [ "$STATUS" = "500" ]; then
            echo "FAIL: bot DB appears to be down (HTTP 500)"
            exit 1
          else
            echo "FAIL: unexpected HTTP $STATUS from bot worker"
            exit 1
          fi

      - name: "Smoke: bot dashboard"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://yourrank.site/bot/dashboard)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: bot dashboard returned HTTP $STATUS (expected 200)"
            exit 1
          fi
          echo "OK: bot dashboard HTTP $STATUS"

      - name: "Smoke: DB connectivity (yourrank.site/health)"
        run: |
          BODY=$(curl -s -L --max-time 20 https://yourrank.site/health || true)
          if echo "$BODY" | grep -qi 'ok'; then
            echo "OK: /health returned ok"
          else
            echo "FAIL: /health did not contain 'ok' — response: $BODY"
            exit 1
          fi

      - name: Summarise failure
        if: failure()
        run: |
          echo "==========================================="
          echo "SMOKE TEST FAILED — deploy may be broken."
          echo "Commit: ${{ github.sha }}"
          echo "Rollback job will attempt automatic recovery."
          echo "==========================================="

  deploy-monitor:
    name: Deploy uptime monitor
    needs: [smoke-test]
    runs-on: ubuntu-latest
    environment: production
    if: success()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run monitor tests
        working-directory: apps/monitor
        run: bun run test

      - name: Typecheck monitor
        working-directory: apps/monitor
        run: bun run typecheck

      - name: Deploy monitor Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/monitor
          command: deploy
          wranglerVersion: "4.106.0"

  # -----------------------------------------------------------------
  # Auto-rollback: triggered ONLY when smoke-test fails.
  # Uses `wrangler rollback` to revert each Worker to its previous
  # Cloudflare deployment — no manual intervention needed.
  # -----------------------------------------------------------------
  rollback:
    needs: [deploy-leaderboard, deploy-bot, deploy-consumer, smoke-test]
    if: always() && needs.smoke-test.result == 'failure'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Rollback leaderboard worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: rollback
          wranglerVersion: "4.106.0"

      - name: Rollback bot worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: rollback
          wranglerVersion: "4.106.0"

      - name: Rollback consumer worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/consumer
          command: rollback
          wranglerVersion: "4.106.0"

      - name: Verify rollback health
        run: |
          echo "Waiting 15s for Cloudflare propagation…"
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://yourrank.site/ || true)
          if [ "$STATUS" = "200" ]; then
            echo "OK: yourrank.site healthy after rollback (HTTP $STATUS)"
          else
            echo "WARNING: yourrank.site returned HTTP $STATUS after rollback"
            echo "Manual intervention may be required."
          fi

      - name: Rollback summary
        if: always()
        run: |
          echo "==========================================="
          echo "AUTO-ROLLBACK EXECUTED"
          echo "Smoke test failed on commit: ${{ github.sha }}"
          echo "Leaderboard, bot, and consumer Workers reverted to previous deployments."
          echo "Pre-deploy leaderboard version: ${{ needs.deploy-leaderboard.outputs.lb-version || 'unknown' }}"
          echo "Pre-deploy bot version:         ${{ needs.deploy-bot.outputs.bot-version || 'unknown' }}"
          echo "Verify: https://yourrank.site"
          echo "==========================================="
