name: Rollback

# Manually deploy a pinned version of a worker for rollback.
# Trigger from GitHub Actions tab → "Run workflow" → select worker + git ref.

on:
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker to rollback (bot or leaderboard)"
        required: true
        type: choice
        options:
          - bot
          - leaderboard
      version:
        description: "Git ref to deploy (commit SHA, tag, or branch)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: rollback-${{ inputs.worker }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ inputs.version }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - run: bun install --frozen-lockfile

      - name: Build leaderboard assets
        if: inputs.worker == 'leaderboard'
        working-directory: apps/leaderboard
        run: node build.js

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1
        with:
          version: 2.39.2

      - name: Push migrations before rollback
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD not set — skipping migration push"
            exit 0
          fi
          if supabase link --project-ref lygcqzjxlqbvymkfjvel --password "$SUPABASE_DB_PASSWORD"; then
            supabase db push --include-all
            echo "Migrations applied for rollback ref ${{ inputs.version }}"
          else
            echo "::warning::supabase link failed during rollback — skipping migrations"
          fi

      - name: Rollback deploy
        working-directory: apps/${{ inputs.worker }}
        run: |
          echo "==========================================="
          echo "ROLLBACK: deploying ${{ inputs.worker }} at ref ${{ inputs.version }}"
          echo "==========================================="
          npx wrangler@4.106.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke check
        run: |
          sleep 15
          if [ "${{ inputs.worker }}" = "leaderboard" ]; then
            URL="https://yourrank.site/"
          else
            URL="https://yourrank.site/bot/dashboard"
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 "$URL")
          if [ "$STATUS" = "200" ]; then
            echo "OK: rollback smoke check passed (HTTP $STATUS)"
          else
            echo "FAIL: rollback smoke check returned HTTP $STATUS"
            exit 1
          fi

      - name: Summarise
        if: always()
        run: |
          echo "==========================================="
          echo "ROLLBACK RESULT"
          echo "Worker: ${{ inputs.worker }}"
          echo "Ref:    ${{ inputs.version }}"
          echo "Status: ${{ job.status }}"
          echo "==========================================="
