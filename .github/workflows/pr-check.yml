name: PR Check

# Runs on every pull request targeting main.
# All jobs must pass before merging.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint bot
        working-directory: apps/bot
        run: bun run lint

      - name: Lint leaderboard
        working-directory: apps/leaderboard
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck bot
        working-directory: apps/bot
        run: bun run typecheck

      - name: Typecheck leaderboard
        working-directory: apps/leaderboard
        run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shared tests
        run: bun test shared/__tests__/

      - name: Run bot tests
        working-directory: apps/bot
        run: bun test

      - name: Run leaderboard tests
        working-directory: apps/leaderboard
        run: |
          for f in src/__tests__/*.test.js; do
            echo "--- $f ---"
            bun test "$f" || exit 1
          done

      - name: Check test coverage threshold
        working-directory: apps/leaderboard
        run: |
          bun test --coverage 2>&1 | tee /tmp/coverage.txt || true
          COVERAGE=$(grep "All files" /tmp/coverage.txt | head -1 | awk '{gsub(/[^0-9.]/, "", $3); print $3}')
          if [ -z "$COVERAGE" ]; then
            echo "WARNING: Could not parse coverage percentage — skipping threshold check"
            exit 0
          fi
          PASS=$(echo "$COVERAGE >= 20" | bc -l 2>/dev/null || echo "1")
          if [ "$PASS" != "1" ]; then
            echo "::error::Test coverage ${COVERAGE}% is below 20% threshold"
            exit 1
          fi
          echo "OK: Test coverage ${COVERAGE}% meets 20% threshold"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build leaderboard
        working-directory: apps/leaderboard
        run: node build.js

      - name: Build bot
        working-directory: apps/bot
        run: bun run typecheck

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (moderate+)
        run: bun audit --audit-level moderate
