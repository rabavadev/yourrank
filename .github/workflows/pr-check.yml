name: PR Check

# Runs on every pull request targeting main.
# All jobs must pass before merging.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint bot
        working-directory: apps/bot
        run: bun run lint

      - name: Lint leaderboard
        working-directory: apps/leaderboard
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck bot
        working-directory: apps/bot
        run: bun run typecheck

      - name: Typecheck leaderboard
        working-directory: apps/leaderboard
        run: bunx tsc --noEmit

      - name: Typecheck monitor
        working-directory: apps/monitor
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: bun run test

      - name: Check test coverage threshold
        working-directory: apps/leaderboard
        run: |
          set -o pipefail
          # audit-validation uses process-global module mocks and is already run
          # in isolation above; loading it with other files corrupts their mocks.
          mapfile -t COVERAGE_FILES < <(find src/__tests__ -name '*.test.js' ! -name 'audit-validation.test.js' -print | sort)
          bun test --coverage "${COVERAGE_FILES[@]}" 2>&1 | tee /tmp/coverage.txt
          COVERAGE=$(grep "All files" /tmp/coverage.txt | head -1 | awk -F'|' '{gsub(/[^0-9.]/, "", $3); print $3}')
          if [ -z "$COVERAGE" ]; then
            echo "::error::Could not parse coverage percentage from test output"
            exit 1
          fi
          if ! awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 60) }'; then
            echo "::error::Test coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
          echo "OK: Test coverage ${COVERAGE}% meets 60% threshold"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build leaderboard
        working-directory: apps/leaderboard
        run: node build.js

      - name: Build bot
        working-directory: apps/bot
        run: bun run typecheck

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (moderate+)
        run: bun audit --audit-level moderate --ignore=GHSA-f88m-g3jw-g9cj
        # sharp <0.35.0 (transitive via wrangler, dev-only) — tracked separately,
        # fix requires wrangler to bundle sharp >=0.35.0. Not a runtime risk.

  migration-dry-run:
    name: Migration Dry-Run
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: yourrank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Validate migration filenames
        run: |
          echo "Checking migration file naming..."
          for f in supabase/migrations/*.sql; do
            basename=$(basename "$f")
            if ! echo "$basename" | grep -qE '^[0-9]{14}_.+\.sql$'; then
              echo "::error::Invalid migration filename: $basename (expected YYYYMMDDHHMMSS_description.sql)"
              exit 1
            fi
          done
          echo "OK: All migration filenames valid"

      - name: Run migrations against ephemeral Postgres
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: test
          PGDATABASE: yourrank_test
        run: |
          echo "Running all migrations against ephemeral Postgres..."
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "--- Applying: $(basename $f) ---"
            psql -v ON_ERROR_STOP=1 -f "$f" || {
              echo "::error::Migration failed: $(basename $f)"
              exit 1
            }
          done
          echo "OK: All migrations applied successfully"

      - name: Verify schema consistency
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: test
          PGDATABASE: yourrank_test
        run: |
          echo "Checking for common schema issues..."
          # Verify all tables have primary keys
          TABLES=$(psql -t -c "SELECT tablename FROM pg_tables WHERE schemaname = 'public';")
          for table in $TABLES; do
            table=$(echo "$table" | xargs)
            if [ -z "$table" ]; then continue; fi
            PK=$(psql -t -c "SELECT count(*) FROM pg_constraint WHERE conrelid = '$table'::regclass AND contype = 'p';")
            PK=$(echo "$PK" | xargs)
            if [ "$PK" = "0" ]; then
              echo "::warning::Table $table has no primary key"
            fi
          done
          echo "OK: Schema consistency checks passed"

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Check E2E environment
        id: e2e-env
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ALLOW_MUTATIONS: ${{ secrets.E2E_ALLOW_MUTATIONS }}
        run: |
          if [ -z "$E2E_BASE_URL" ] || [ "$E2E_ALLOW_MUTATIONS" != "1" ]; then
            echo "E2E not configured; skipping smoke tests."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        if: steps.e2e-env.outputs.skip != 'true'
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        if: steps.e2e-env.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Run E2E smoke tests
        if: steps.e2e-env.outputs.skip != 'true'
        working-directory: e2e
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ALLOW_MUTATIONS: ${{ secrets.E2E_ALLOW_MUTATIONS }}
          E2E_TELEGRAM_BOT_TOKEN: ${{ secrets.E2E_TELEGRAM_BOT_TOKEN }}
        run: bun run test
