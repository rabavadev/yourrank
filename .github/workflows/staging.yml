name: Deploy Staging

# Manual trigger only — staging deploys are on-demand, not automatic.
# Trigger from the GitHub Actions tab with "Run workflow".

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-leaderboard-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/leaderboard
        run: |
          # Run each test file in isolation to prevent mock.module cross-contamination
          for f in src/__tests__/*.test.js; do
            echo "--- $f ---"
            bun test "$f" || exit 1
          done
      - working-directory: apps/leaderboard
        run: node build.js
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: deploy --env staging
          wranglerVersion: "4.106.0"

  deploy-bot-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.2.15'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/bot
        run: bun test
      - working-directory: apps/bot
        run: bun run typecheck
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: deploy --env staging
          wranglerVersion: "4.106.0"
