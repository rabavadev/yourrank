name: Deploy Staging

# Manual trigger only — staging deploys are on-demand, not automatic.
# Trigger from the GitHub Actions tab with "Run workflow".

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-leaderboard-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/leaderboard
        run: |
          # Run each test file in isolation to prevent mock.module cross-contamination
          for f in src/__tests__/*.test.js; do
            echo "--- $f ---"
            bun test "$f" || exit 1
          done
      - working-directory: apps/leaderboard
        run: node build.js
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/leaderboard
          command: deploy --env staging
          wranglerVersion: "4.106.0"

  deploy-bot-staging:
    needs: deploy-leaderboard-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.0'
      - run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level moderate
      - name: Run tests
        working-directory: apps/bot
        run: bun test
      - working-directory: apps/bot
        run: bun run typecheck
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bot
          command: deploy --env staging
          wranglerVersion: "4.106.0"

  smoke-test-staging:
    needs: [deploy-leaderboard-staging, deploy-bot-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare propagation
        run: sleep 15

      - name: "Smoke: staging health"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 https://staging.yourrank.site/ || true)
          if [ "$STATUS" = "200" ]; then
            echo "OK: staging.yourrank.site is live (HTTP $STATUS)"
          else
            echo "WARNING: staging.yourrank.site returned HTTP $STATUS — staging may not be configured yet"
            echo "This is expected if staging DNS and Hyperdrive are not set up."
          fi

      - name: "Smoke: staging dashboard"
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://staging.yourrank.site/bot/dashboard || true)
          if [ "$STATUS" = "200" ]; then
            echo "OK: staging dashboard HTTP $STATUS"
          else
            echo "WARNING: staging dashboard returned HTTP $STATUS"
          fi

      - name: Staging deploy summary
        if: always()
        run: |
          echo "==========================================="
          echo "STAGING DEPLOY COMPLETE"
          echo "Commit: ${{ github.sha }}"
          echo "Note: staging smoke tests use continue-on-error"
          echo "because staging infra (DNS, Hyperdrive) may not"
          echo "be configured yet."
          echo "==========================================="
